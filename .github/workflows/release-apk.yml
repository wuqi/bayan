name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 设置 Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 创建 Cordova 项目
        run: |
          cordova create app com.example.accordion "手风琴键盘"
          cp index.html app/www/
          cp rough.js app/www/
          cp smplr.js app/www/
          cp soundfont2.js app/www/
          cp 8bitsf.SF2 app/www/
          cp icon.png app/

      - name: 添加 Android 平台
        run: |
          cd app
          cordova platform add android@13.0.0

      - name: 安装插件
        run: |
          cd app
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-whitelist

      - name: 配置 config.xml
        run: |
          cd app
          cat > config.xml << 'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.example.accordion" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
              <name>手风琴键盘</name>
              <description>手风琴键盘应用</description>
              <author email="support@example.com" href="http://example.com">Your Name</author>
              <content src="index.html" />
              <preference name="Orientation" value="landscape" />
              <preference name="android-minSdkVersion" value="24" />
              <preference name="android-targetSdkVersion" value="34" />
              <preference name="android-compileSdkVersion" value="34" />
              <preference name="AndroidInsecureFileModeEnabled" value="true" />
              <preference name="android-useAndroidX" value="true" />
              <preference name="AllowInlineMediaPlayback" value="true" />
              <preference name="MediaPlaybackRequiresUserAction" value="false" />
              <preference name="Fullscreen" value="true" />
              <preference name="ShowTitle" value="false" />
              <icon src="icon.png" />
          </widget>
          EOF

      - name: 配置 Gradle
        run: |
          cd app/platforms/android
          cat >> gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          android.injected.testOnly=false
          org.gradle.jvmargs=-Xmx2048m
          EOF

      - name: 构建 Release APK
        run: |
          cd app
          cordova build android --release -- --packageType=apk

          APK_FILE=$(find platforms/android/app/build/outputs/apk/release -name "*.apk" -type f | head -1)
          if [ -f "$APK_FILE" ]; then
            echo "找到 APK: $APK_FILE"
            cp "$APK_FILE" app-release-unsigned.apk
          else
            echo "错误: 未找到 APK"
            exit 1
          fi

      - name: 准备签名密钥
        run: |
          cd app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: 签名 APK
        run: |
          cd app

          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | head -1)
          echo "使用: $APKSIGNER"

          $APKSIGNER sign \
            --ks release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out app-release-signed.apk \
            app-release-unsigned.apk

      - name: 验证签名
        run: |
          cd app
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | head -1)
          $APKSIGNER verify --verbose app-release-signed.apk

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: accordion-release
          path: app/app-release-signed.apk

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/app-release-signed.apk
          tag_name: ${{ github.ref_name }}
          body: |
            ## 手风琴键盘 ${{ github.ref_name }}

            ### 安装说明
            1. 下载 APK 文件
            2. 允许"安装未知应用"权限
            3. 点击安装

            ### 系统要求
            - Android 7.0+ (API 24+)
            - 签名: apksigner 最新标准
