name: Release 构建 (签名版)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 接受 Android 许可证
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: 安装 Android 构建工具
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 准备 Cordova 项目
        run: |
          cordova create app com.example.accordion "手风琴键盘"
          cp index.html app/www/
          cp rough.js app/www/
          cp smplr.js app/www/
          cp soundfont2.js app/www/
          cp 8bitsf.SF2 app/www/
          cp icon.png app/

      - name: 添加 Android 平台
        run: |
          cd app
          cordova platform add android

      - name: 配置 config.xml
        run: |
          cd app
          # 屏幕方向设置为横屏
          sed -i '/<\/widget>/i \    <icon src="icon.png" />' config.xml
          sed -i '/<\/widget>/i \    <preference name="Orientation" value="landscape" />' config.xml
          sed -i '/<\/widget>/i \    <preference name="AndroidInsecureFileModeEnabled" value="true" />' config.xml
          sed -i '/<\/widget>/i \    <preference name="AllowInlineMediaPlayback" value="true" />' config.xml
          sed -i '/<\/widget>/i \    <preference name="MediaPlaybackRequiresUserAction" value="false" />' config.xml
          # 显示配置内容
          grep -A5 -B5 'preference' config.xml

      - name: 构建 Release APK
        run: |
          cd app
          # 显示Cordova版本
          cordova --version
          # 显示Android平台信息
          cordova platform ls
          # 强制生成 APK 而不是 AAB
          cordova build android --release -- --packageType=apk --verbose

          echo "=== 查找生成的 APK 文件 ==="
          find . -name "*.apk" -type f | head -20
          echo "=== 查找生成的 AAB 文件 ==="
          find . -name "*.aab" -type f | head -20
          # 显示APK文件信息
          APK_FILE=$(find . -name "*.apk" -type f | grep -v debug | head -1)
          if [ -f "$APK_FILE" ]; then
            echo "=== APK 文件信息 ==="
            ls -la "$APK_FILE"
            # 尝试查看APK的包信息
            if command -v aapt &> /dev/null; then
              echo "=== APK 包信息 ==="
              aapt dump badging "$APK_FILE" | head -20
            else
              echo "aapt 命令不可用，无法查看包信息"
            fi
          fi

      - name: 签名 APK
        run: |
          echo "=== 检查密钥库配置 ==="
          KEYSTORE_BASE64="${{ secrets.KEYSTORE_BASE64 }}"

          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ 错误: KEYSTORE_BASE64 secret 未设置"
            echo "请按照以下步骤设置签名密钥库:"
            echo "1. 生成签名密钥库: keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000"
            echo "2. 将密钥库转换为 base64: openssl base64 -A -in release.keystore"
            echo "3. 将输出的 base64 字符串设置为 GitHub repository secret: KEYSTORE_BASE64"
            echo "4. 同时设置: KEYSTORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS"
            echo ""
            echo "本次构建将生成未签名的 APK 供手动签名"

            # 复制未签名的 APK
            find app -name "*release*unsigned*.apk" -type f | head -1 | xargs -I {} cp {} signed_app.apk 2>/dev/null || true
            if [ ! -f signed_app.apk ]; then
              find app -name "*.apk" -type f | grep -v debug | head -1 | xargs -I {} cp {} signed_app.apk
            fi
            exit 0
          fi

          # 解码 keystore（移除可能的换行符）
          echo "$KEYSTORE_BASE64" | tr -d '\n\r' | base64 -d > keystore.jks

          # 验证 keystore 文件
          echo "=== 验证 keystore 文件 ==="
          file keystore.jks || true
          ls -la keystore.jks

          # 检查 keystore 是否为空
          if [ ! -s keystore.jks ]; then
            echo "❌ 错误: keystore.jks 文件为空或无效"
            echo "请检查 KEYSTORE_BASE64 secret 是否正确"
            echo "可能的原因:"
            echo "1. base64 字符串格式错误"
            echo "2. 文件损坏"
            echo "3. 包含不可见字符"
            echo ""
            echo "本次构建将生成未签名的 APK 供手动签名"

            # 复制未签名的 APK
            UNSIGNED_APK=$(find app -name "*release*unsigned*.apk" -type f | head -1)
            if [ -n "$UNSIGNED_APK" ]; then
              cp "$UNSIGNED_APK" signed_app.apk
            else
              find app -name "*.apk" -type f | grep -v debug | head -1 | xargs -I {} cp {} signed_app.apk
            fi
            exit 0
          fi

          # 检查 keystore 内容
          echo "=== 检查 keystore 内容 ==="
          if ! keytool -list -keystore keystore.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" 2>/dev/null; then
            echo "❌ 错误: 无法读取 keystore 内容"
            echo "请检查:"
            echo "1. KEYSTORE_PASSWORD 是否正确"
            echo "2. KEY_ALIAS 是否正确"
            echo "3. 密钥库是否损坏"
            echo ""
            echo "本次构建将生成未签名的 APK 供手动签名"

            UNSIGNED_APK=$(find app -name "*release*unsigned*.apk" -type f | head -1)
            if [ -n "$UNSIGNED_APK" ]; then
              cp "$UNSIGNED_APK" signed_app.apk
            else
              find app -name "*.apk" -type f | grep -v debug | head -1 | xargs -I {} cp {} signed_app.apk
            fi
            exit 0
          fi

          # 查找未签名的 APK 文件
          echo "=== 查找未签名的 APK 文件 ==="
          find app -name "*.apk" -type f | grep -v debug | head -10

          UNSIGNED_APK=$(find app -name "*release*unsigned*.apk" -type f | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            UNSIGNED_APK=$(find app -name "*.apk" -type f | grep -v debug | head -1)
          fi

          if [ -z "$UNSIGNED_APK" ]; then
            echo "错误: 未找到 APK 文件"
            find app -name "*.apk" -type f
            exit 1
          fi

          echo "找到 APK: $UNSIGNED_APK"
          ls -la "$UNSIGNED_APK"

          echo "=== 开始签名 APK ==="
          # 签名 APK
          if ! jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            "$UNSIGNED_APK" \
            "${{ secrets.KEY_ALIAS }}"; then
            echo "❌ 签名失败"
            echo "本次构建将生成未签名的 APK 供手动签名"
            cp "$UNSIGNED_APK" signed_app.apk
            exit 0
          fi

          echo "✓ APK 签名成功"

          # 查找 apksigner 工具（用于 V2 签名）
          APKSIGNER_PATH=$(find $ANDROID_HOME/build-tools -name "apksigner" -type f | head -1)
          if [ -n "$APKSIGNER_PATH" ]; then
            echo "使用 apksigner 进行 V2 签名"
            if "$APKSIGNER_PATH" sign \
              --ks keystore.jks \
              --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
              --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
              --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
              --v1-signing-enabled true \
              --v2-signing-enabled true \
              "$UNSIGNED_APK"; then
              echo "✓ V2 签名成功"
            else
              echo "⚠️ V2 签名失败，继续使用 V1 签名"
            fi
          else
            echo "⚠️ apksigner 未找到，只使用 V1 签名"
          fi

          # 优化 APK (zipalign)
          ZIPALIGN_PATH=$(find $ANDROID_HOME/build-tools -name "zipalign" -type f | head -1)
          if [ -n "$ZIPALIGN_PATH" ]; then
            echo "使用 zipalign: $ZIPALIGN_PATH"
            # 先创建临时文件
            TEMP_APK="temp_signed_app.apk"
            if "$ZIPALIGN_PATH" -v 4 "$UNSIGNED_APK" "$TEMP_APK"; then
              echo "✓ zipalign 成功"
              mv "$TEMP_APK" signed_app.apk
              # 验证对齐
              "$ZIPALIGN_PATH" -c -v 4 signed_app.apk
            else
              echo "警告: zipalign 失败，直接复制 APK"
              cp "$UNSIGNED_APK" signed_app.apk
            fi
          else
            echo "警告: zipalign 未找到，直接复制 APK"
            cp "$UNSIGNED_APK" signed_app.apk
          fi

          echo "✓ APK 处理完成"

      - name: 上传签名版 APK
        uses: actions/upload-artifact@v4
        with:
          name: 手风琴键盘-Release签名版
          path: signed_app.apk

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          files: signed_app.apk
          tag_name: ${{ github.ref_name }}
          body: |
            ## 手风琴键盘 v${{ github.ref_name }}
            
            ### 更新内容
            - 请在此填写版本更新说明
            
            ### 安装说明
            下载 APK 后直接安装即可使用