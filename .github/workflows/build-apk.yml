name: 构建并签名 Android 正式版 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 环境准备
        run: |
          npm install -g cordova
          # 确保有 Android SDK 环境变量
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

      - name: 初始化 Cordova 并构建 Release
        run: |
          cordova create build_project com.example.accordion "AccordionKeyboard"
          rsync -av --exclude='build_project' ./ build_project/www/
          cd build_project
          cordova platform add android
          sed -i '/<\/widget>/i \    <preference name="AndroidInsecureFileModeEnabled" value="true" />' config.xml
          # 强制生成 APK
          cordova build android --release --device -- --packageType=apk

      - name: 原生签名 APK
        run: |
          # 1. 将 Secrets 里的 Base64 还原为文件
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.jks
          
          # 2. 找到生成的未签名 APK 路径
          UNSIGNED_APK=$(find build_project/platforms/android/app/build/outputs/apk/release/ -name "*-release-unsigned.apk" | head -n 1)
          
          # 3. 使用系统自带的 apksigner 进行签名
          # 路径通常在 $ANDROID_SDK_ROOT/build-tools/最新版本/apksigner
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -r | head -n 1)
          
          $APKSIGNER sign --ks release.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out accordion-signed.apk \
            "$UNSIGNED_APK"
          
          echo "签名完成：accordion-signed.apk"

      - name: 上传已签名的 APK
        uses: actions/upload-artifact@v4
        with:
          name: 手风琴键盘-正式版
          path: accordion-signed.apk
