name: 构建 Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;30.0.3'

      - name: 接受 Android 许可证
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 准备 Cordova 项目并构建
        run: |
          # 创建项目
          cordova create build_tmp com.example.accordion "手风琴键盘"
          
          # 复制文件
          cp -f index.html build_tmp/www/
          cp -f rough.js build_tmp/www/
          cp -f smplr.js build_tmp/www/
          cp -f soundfont2.js build_tmp/www/
          cp -f 8bitsf.SF2 build_tmp/www/
          
          echo "=== 复制后的文件列表 ==="
          ls -la build_tmp/www/
          
          # 添加 Android 平台
          cd build_tmp
          cordova platform add android
          
          # 配置 config.xml
          cat >> config.xml << 'EOF'
      <preference name="AndroidInsecureFileModeEnabled" value="true" />
      <preference name="AllowInlineMediaPlayback" value="true" />
      <preference name="MediaPlaybackRequiresUserAction" value="false" />
      <access origin="file://*" />
      <access origin="*" />
      EOF
          
          # 构建（添加详细输出）
          echo "=== 开始构建 ==="
          cordova build android --release --verbose
          
          echo "=== 构建完成，查找 APK ==="
          find . -name "*.apk" -type f 2>/dev/null

      - name: 查找并上传 APK（未签名版）
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 手风琴键盘-未签名版
          path: build_tmp/platforms/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn