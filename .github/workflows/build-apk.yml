name: 构建并签名 Android 正式版 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 【关键修复步 1】手动安装 Android SDK 及其工具
      - name: 设置 Android SDK 环境
        uses: android-actions/setup-android@v3

      # 【关键修复步 2】确保安装了具体的 Build Tools 版本
      - name: 安装 Build Tools 30.0.3
        run: sdkmanager "build-tools;30.0.3"

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 初始化 Cordova 并构建 Release
        run: |
          cordova create build_project com.example.accordion "AccordionKeyboard"
          rsync -av --exclude='build_project' ./ build_project/www/
          cd build_project
          cordova platform add android
          sed -i '/<\/widget>/i \    <preference name="AndroidInsecureFileModeEnabled" value="true" />' config.xml
          # 强制生成 APK
          cordova build android --release --device -- --packageType=apk

      - name: 签名正式版 APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: build_project/platforms/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          # 【关键修复步 3】明确告知插件使用新安装的版本
          buildToolsVersion: "30.0.3"

      - name: 上传已签名的 APK 到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 手风琴键盘-正式签名版
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          if-no-files-found: error
