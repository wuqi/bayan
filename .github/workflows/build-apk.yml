name: 构建并签名 Android 正式版 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 准备 Cordova 项目并构建 Release
        run: |
          # 1. 创建构建专用目录
          cordova create build_tmp com.example.accordion "AccordionKeyboard"
          
          # 2. 将源码复制进项目 (假设你的 index.html 在根目录)
          cp -rv ./* build_tmp/www/ 2>/dev/null || true
          
          # 3. 进入目录添加平台
          cd build_tmp
          cordova platform add android
          
          # 4. 配置权限和不安全文件模式（你的原需求）
          sed -i '/<\/widget>/i \    <preference name="AndroidInsecureFileModeEnabled" value="true" />' config.xml
          
          # 5. 构建未签名的 Release APK
          cordova build android --release

      - name: 签名正式版 APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          # 指向 Cordova 生成的 release 目录
          releaseDirectory: build_tmp/platforms/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: 上传已签名的 APK 到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 手风琴键盘-正式签名版
          # 使用签名插件自动输出的已签名文件路径
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          if-no-files-found: error
