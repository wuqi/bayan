name: 构建并签名 Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;30.0.3'

      - name: 接受 Android 许可证
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 准备 Cordova 项目并构建
        run: |
          # 创建项目
          cordova create build_tmp com.example.accordion "手风琴键盘"
          
          # 复制文件
          cp -f index.html build_tmp/www/
          cp -f rough.js build_tmp/www/
          cp -f smplr.js build_tmp/www/
          cp -f soundfont2.js build_tmp/www/
          cp -f 8bitsf.SF2 build_tmp/www/
          
          echo "=== 文件列表 ==="
          ls -la build_tmp/www/
          
          cd build_tmp
          cordova platform add android
          
          # 用 echo 追加配置（避免 heredoc 语法问题）
          echo '    <preference name="AndroidInsecureFileModeEnabled" value="true" />' >> config.xml
          echo '    <preference name="AllowInlineMediaPlayback" value="true" />' >> config.xml
          echo '    <preference name="MediaPlaybackRequiresUserAction" value="false" />' >> config.xml
          echo '    <access origin="file://*" />' >> config.xml
          echo '    <access origin="*" />' >> config.xml
          
          # 构建未签名 APK
          cordova build android --release
          
          echo "=== 查找 APK ==="
          find . -name "*.apk"

      - name: 恢复 keystore 并签名
        if: success() && secrets.KEYSTORE_BASE64 != ''
        run: |
          # 从 Base64 恢复 keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          
          # 找到未签名的 APK
          UNSIGNED_APK=$(find build_tmp/platforms/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "未签名 APK: $UNSIGNED_APK"
          
          # 签名
          jarsigner -verbose \
            -sigalg SHA1withRSA \
            -digestalg SHA1 \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            "$UNSIGNED_APK" \
            "${{ secrets.KEY_ALIAS }}"
          
          # 验证签名
          jarsigner -verify "$UNSIGNED_APK"
          
          # 对齐优化
          zipalign -v -p 4 "$UNSIGNED_APK" signed_app.apk

      - name: 上传未签名 APK（如果没有签名密钥）
        if: success() && secrets.KEYSTORE_BASE64 == ''
        uses: actions/upload-artifact@v4
        with:
          name: 手风琴键盘-未签名版
          path: build_tmp/platforms/android/app/build/outputs/apk/release/*.apk

      - name: 上传已签名 APK
        if: success() && secrets.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: 手风琴键盘-签名版
          path: signed_app.apk