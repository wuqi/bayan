name: 构建 Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境 (Cordova 必需)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Cordova 12+ 推荐使用 JDK 17

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 初始化并构建项目
        run: |
          # 1. 创建项目（注意：直接在当前目录下操作，避免多层 app 文件夹嵌套）
          cordova create build_tmp com.example.accordion "AccordionKeyboard"
          
          # 2. 将你的源代码(www内容)复制进 Cordova 目录
          # 假设你的 index.html 等文件在仓库根目录
          cp -rv ./* build_tmp/www/ 2>/dev/null || true
          
          # 3. 进入目录添加平台并构建
          cd build_tmp
          cordova platform add android
          
          # 修正 config.xml 配置
          sed -i '/<\/widget>/i \    <preference name="AndroidInsecureFileModeEnabled" value="true" />' config.xml
          
          # 执行 Debug 构建（这样生成的 APK 可以直接安装测试）
          cordova build android --debug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: 手风琴键盘-测试版
          # 使用通配符递归查找，彻底解决路径找不到的问题
          path: "build_tmp/platforms/android/app/build/outputs/apk/debug/*.apk"
          if-no-files-found: error # 如果没找到文件，直接让 Action 报错提醒
