name: 构建并签名 Android 正式版 APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境 (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 新增步骤：手动安装 Android SDK 组件
      - name: 安装 Android Build Tools
        uses: android-actions/setup-android@v3
        with:
          # 安装 29.0.3 或者是你项目需要的版本（建议用 30.0.3 更稳）
          build-tools: "30.0.3"

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 初始化 Cordova 并构建 Release
        run: |
          # 1. 创建一个临时构建目录
          cordova create build_project com.example.accordion "AccordionKeyboard"
          
          # 2. 将仓库根目录的源码（HTML/JS/CSS）同步到 Cordova 的 www 目录
          # 排除掉 build_project 自身，防止无限递归
          rsync -av --exclude='build_project' ./ build_project/www/
          
          cd build_project
          
          # 3. 添加 Android 平台并配置
          cordova platform add android
          
          # 修改 config.xml 支持不安全文件模式（你的特定需求）
          sed -i '/<\/widget>/i \    <preference name="AndroidInsecureFileModeEnabled" value="true" />' config.xml
          
          # 4. 执行正式版构建
          # 使用 --device 强制生成可安装的 APK
          cordova build android --release --device --verbose -- --packageType=apk
          
          # 【重要调试】打印当前生成的 APK 路径，如果这步没输出，说明构建失败了
          echo "检查生成的 APK 文件位置："
          find platforms/android/app/build/outputs/apk/ -name "*.apk"

      - name: 签名正式版 APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          # 路径必须与上面 find 出来的匹配
          releaseDirectory: build_project/platforms/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: 上传已签名的 APK 到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 手风琴键盘-正式版
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          if-no-files-found: error
