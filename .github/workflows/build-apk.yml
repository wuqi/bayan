name: 构建 Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 接受 Android 许可证
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 准备 Cordova 项目
        run: |
          # 创建项目
          cordova create app com.example.accordion "手风琴键盘"
          
          # 复制文件
          cp index.html app/www/
          cp rough.js app/www/
          cp smplr.js app/www/
          cp soundfont2.js app/www/
          cp 8bitsf.SF2 app/www/
          cp icon.png app/www/
          
          echo "=== 文件列表 ==="
          ls -la app/www/

      - name: 添加 Android 平台
        run: |
          cd app
          cordova platform add android

      - name: 配置 config.xml
        run: |
          cd app
          # 用 sed 在 </widget> 标签前插入配置
          sed -i '/<\/widget>/i \    <icon src="icon.png" />' config.xml
          sed -i '/<\/widget>/i \    <preference name="AndroidInsecureFileModeEnabled" value="true" />' config.xml
          sed -i '/<\/widget>/i \    <preference name="AllowInlineMediaPlayback" value="true" />' config.xml
          sed -i '/<\/widget>/i \    <preference name="MediaPlaybackRequiresUserAction" value="false" />' config.xml
          
          # 验证 XML 结构
          head -20 config.xml

      - name: 构建 APK
        run: |
          cd app
          cordova build android
          
          echo "=== 查找 APK ==="
          find . -name "*.apk"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 手风琴键盘-调试版
          path: app/platforms/android/app/build/outputs/apk/debug/*.apk